name: Build libheif (Windows MSVC)

on:
  workflow_dispatch:
  schedule:
    # Rebuild pinned versions weekly so toolchain/runner drift surfaces early.
    - cron: "17 6 * * 1"
  push:
    # Do not combine tags with paths filters: a tag-only push would be skipped.
    branches: [main]
    tags:
      - "libheif-v*"

permissions:
  contents: write

env:
  TRIPLET: x64-windows-static-md

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read versions.json
        id: ver
        shell: pwsh
        run: |
          $v = Get-Content versions.json -Raw | ConvertFrom-Json
          $libheif = $v.libheif.version
          $features = ($v.libheif.vcpkg_features -join ",")
          # actions/cache keys cannot contain commas
          $featuresKey = ($v.libheif.vcpkg_features -join "+")
          $includeDebug = if ($v.asset.include_debug) { "true" } else { "false" }

          # Prefer explicit ref (commit or tag); fall back to legacy "tag" key.
          $ref = $null
          $refKind = "tag"
          if ($v.vcpkg.ref) {
            $ref = $v.vcpkg.ref
            $refKind = if ($v.vcpkg.ref_kind) { $v.vcpkg.ref_kind } else {
              if ($ref -match '^[0-9a-f]{7,40}$') { "commit" } else { "tag" }
            }
          } elseif ($v.vcpkg.tag) {
            $ref = $v.vcpkg.tag
            $refKind = "tag"
          } else {
            throw "versions.json missing vcpkg.ref or vcpkg.tag"
          }

          $asset = "libheif-msvc-$env:TRIPLET-$libheif.zip"
          "libheif=$libheif" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_ref_kind=$refKind" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "features=$features" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "features_key=$featuresKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "include_debug=$includeDebug" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "libheif=$libheif vcpkg=$refKind/$ref features=$features asset=$asset"

      - name: Cache vcpkg downloads and buildtrees
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/downloads
            C:/vcpkg/buildtrees
            C:/vcpkg/packages
          key: vcpkg-${{ env.TRIPLET }}-${{ steps.ver.outputs.vcpkg_ref }}-${{ steps.ver.outputs.libheif }}-${{ steps.ver.outputs.features_key }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $ref = "${{ steps.ver.outputs.vcpkg_ref }}"
          $kind = "${{ steps.ver.outputs.vcpkg_ref_kind }}"
          $git = "https://github.com/microsoft/vcpkg"
          if (Test-Path C:\vcpkg\.vcpkg-root) {
            Remove-Item -Recurse -Force C:\vcpkg
          }
          if ($kind -eq "commit") {
            git clone --filter=blob:none $git C:\vcpkg
            Push-Location C:\vcpkg
            git checkout $ref
            Pop-Location
          } else {
            git clone --depth 1 --branch $ref $git C:\vcpkg
          }
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install libheif
        shell: pwsh
        run: |
          $features = "${{ steps.ver.outputs.features }}"
          $pkg = "libheif[${features}]:$env:TRIPLET"
          Write-Host "vcpkg install $pkg"
          & C:\vcpkg\vcpkg.exe install $pkg --clean-after-build
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed: $LASTEXITCODE" }
          if (-not (Test-Path "C:\vcpkg\installed\$env:TRIPLET\lib\heif.lib")) {
            throw "heif.lib missing after install"
          }

      - name: Package release zip
        id: pkg
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          TRIPLET: ${{ env.TRIPLET }}
          OUT_ZIP: ${{ github.workspace }}/dist/${{ steps.ver.outputs.asset }}
          LIBHEIF_VERSION: ${{ steps.ver.outputs.libheif }}
          INCLUDE_DEBUG: ${{ steps.ver.outputs.include_debug }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          .\scripts\package-vcpkg-libheif.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: |
            dist/${{ steps.ver.outputs.asset }}
            dist/${{ steps.ver.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        # Tags always publish. On main/schedule/dispatch, publish only when the
        # packaged version matches versions.json (guards against bad pins).
        if: >
          startsWith(github.ref, 'refs/tags/libheif-v') ||
          ((github.event_name == 'workflow_dispatch' ||
            github.event_name == 'schedule' ||
            github.event_name == 'push') &&
           steps.pkg.outputs.resolved_version == steps.ver.outputs.libheif)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ steps.pkg.outputs.resolved_version }}"
          $asset = "${{ steps.ver.outputs.asset }}"
          $path = "dist/$asset"
          $sum = "$path.sha256"
          $sha = "${{ steps.pkg.outputs.sha256 }}"
          if ($env:GITHUB_REF -like "refs/tags/libheif-v*") {
            $tag = $env:GITHUB_REF_NAME
            if ($tag -ne "libheif-v$ver") {
              throw "git tag $tag does not match packaged libheif-v$ver"
            }
          } else {
            $tag = "libheif-v$ver"
          }
          $triplet = $env:TRIPLET
          $features = "${{ steps.ver.outputs.features }}"
          $refKind = "${{ steps.ver.outputs.vcpkg_ref_kind }}"
          $ref = "${{ steps.ver.outputs.vcpkg_ref }}"
          $includeDebug = "${{ steps.ver.outputs.include_debug }}"
          # Avoid PowerShell @"..."@ here-strings: a column-0 closing "@" ends the
          # YAML block scalar, and lines like "- Features:" then parse as YAML.
          $notes = @(
            "Prebuilt MSVC libheif $ver for Easel ($triplet).",
            "",
            "* Features: $features",
            "* vcpkg ${refKind}: ``$ref``",
            "* SHA256: ``$sha``",
            "* Debug libs: $includeDebug",
            "",
            "Extract and set ``VCPKG_ROOT`` to the extract root before building Easel.",
            "The zip root must contain ``.vcpkg-root`` and ``installed/``."
          ) -join "`n"
          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $path $sum --title $tag --notes $notes
          } else {
            gh release upload $tag $path $sum --clobber
            gh release edit $tag --notes $notes
          }
          Write-Host "Published $tag / $asset (sha256=$sha)"
