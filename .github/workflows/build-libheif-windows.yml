name: Build libheif (Windows MSVC)

on:
  workflow_dispatch:
  push:
    tags:
      - "libheif-v*"
    paths:
      - "versions.json"
      - "scripts/**"
      - ".github/workflows/build-libheif-windows.yml"

permissions:
  contents: write

env:
  TRIPLET: x64-windows-static-md

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read versions.json
        id: ver
        shell: pwsh
        run: |
          $v = Get-Content versions.json -Raw | ConvertFrom-Json
          $libheif = $v.libheif.version
          $tag = $v.vcpkg.tag
          $features = ($v.libheif.vcpkg_features -join ",")
          "libheif=$libheif" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "features=$features" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $asset = "libheif-msvc-$env:TRIPLET-$libheif.zip"
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "libheif=$libheif vcpkg=$tag features=$features asset=$asset"

      - name: Cache vcpkg downloads and buildtrees
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/downloads
            C:/vcpkg/buildtrees
            C:/vcpkg/packages
          key: vcpkg-${{ env.TRIPLET }}-${{ steps.ver.outputs.vcpkg_tag }}-${{ steps.ver.outputs.libheif }}-${{ steps.ver.outputs.features }}

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.vcpkg_tag }}"
          if (-not (Test-Path C:\vcpkg\.vcpkg-root)) {
            git clone --depth 1 --branch $tag https://github.com/microsoft/vcpkg C:\vcpkg
          } else {
            Push-Location C:\vcpkg
            git fetch --depth 1 origin tag $tag
            git checkout $tag
            Pop-Location
          }
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install libheif
        shell: pwsh
        run: |
          $features = "${{ steps.ver.outputs.features }}"
          # vcpkg feature syntax: libheif[core,aom,hevc]:triplet
          $pkg = "libheif[${features}]:$env:TRIPLET"
          Write-Host "vcpkg install $pkg"
          & C:\vcpkg\vcpkg.exe install $pkg --clean-after-build
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed: $LASTEXITCODE" }
          Test-Path "C:\vcpkg\installed\$env:TRIPLET\lib\heif.lib" | ForEach-Object {
            if (-not $_) { throw "heif.lib missing after install" }
          }

      - name: Package release zip
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          TRIPLET: ${{ env.TRIPLET }}
          OUT_ZIP: ${{ github.workspace }}/dist/${{ steps.ver.outputs.asset }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          .\scripts\package-vcpkg-libheif.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: dist/${{ steps.ver.outputs.asset }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/libheif-v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ steps.ver.outputs.libheif }}"
          $asset = "${{ steps.ver.outputs.asset }}"
          $path = "dist/$asset"
          if ($env:GITHUB_REF -like "refs/tags/libheif-v*") {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "libheif-v$ver"
          }
          $notes = @"
          Prebuilt MSVC libheif $ver for Easel (`$env:TRIPLET`).

          Features: ${{ steps.ver.outputs.features }}
          vcpkg tag: ${{ steps.ver.outputs.vcpkg_tag }}

          Extract and set ``VCPKG_ROOT`` to the extract root before building Easel.
          "@
          # Create or update the release, then upload (clobber) the asset.
          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $path --title $tag --notes $notes
          } else {
            gh release upload $tag $path --clobber
            # Refresh notes on dispatch rebuilds.
            gh release edit $tag --notes $notes
          }
          Write-Host "Published $tag / $asset"
