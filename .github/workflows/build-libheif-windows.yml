name: Build libheif (Windows MSVC)

on:
  workflow_dispatch:
  schedule:
    # Rebuild pinned versions weekly so toolchain/runner drift surfaces early.
    - cron: "17 6 * * 1"
  push:
    # Do not combine tags with paths filters: a tag-only push would be skipped.
    # Main pushes that would not publish exit in the gate step (~seconds).
    branches: [main]
    tags:
      - "libheif-v*"

permissions:
  contents: write

env:
  TRIPLET: x64-windows-static-md
  # Skip debug builds (~half of aom/x265 compile time). Release zip already
  # omits debug/; Easel CI only links release libs.
  VCPKG_BUILD_TYPE: release
  # Binary cache in GitHub Actions cache — second+ builds restore packed
  # packages instead of recompiling aom/x265/libheif.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # Keep source tarballs outside the vcpkg git tree so bootstrap can refresh
  # the checkout without wiping the download cache.
  VCPKG_DOWNLOADS: ${{ runner.temp }}/vcpkg-downloads

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read versions.json
        id: ver
        shell: pwsh
        run: |
          $v = Get-Content versions.json -Raw | ConvertFrom-Json
          $libheif = $v.libheif.version
          $features = ($v.libheif.vcpkg_features -join ",")
          # actions/cache keys cannot contain commas
          $featuresKey = ($v.libheif.vcpkg_features -join "+")
          $includeDebug = if ($v.asset.include_debug) { "true" } else { "false" }

          # Prefer explicit ref (commit or tag); fall back to legacy "tag" key.
          $ref = $null
          $refKind = "tag"
          if ($v.vcpkg.ref) {
            $ref = $v.vcpkg.ref
            $refKind = if ($v.vcpkg.ref_kind) { $v.vcpkg.ref_kind } else {
              if ($ref -match '^[0-9a-f]{7,40}$') { "commit" } else { "tag" }
            }
          } elseif ($v.vcpkg.tag) {
            $ref = $v.vcpkg.tag
            $refKind = "tag"
          } else {
            throw "versions.json missing vcpkg.ref or vcpkg.tag"
          }

          $asset = "libheif-msvc-$env:TRIPLET-$libheif.zip"
          "libheif=$libheif" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_ref_kind=$refKind" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "features=$features" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "features_key=$featuresKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "include_debug=$includeDebug" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "libheif=$libheif vcpkg=$refKind/$ref features=$features asset=$asset"

      - name: Decide whether a full build is needed
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $ver = "${{ steps.ver.outputs.libheif }}"
          $base = "libheif-v$ver"
          $fromTagPush = $env:GITHUB_REF -like "refs/tags/libheif-v*"
          $forceRebuild = $env:EVENT_NAME -in @("workflow_dispatch", "schedule")

          function Test-AnyVersionRelease([string]$BaseTag) {
            gh release view $BaseTag 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) { return $true }
            $json = gh release list --limit 100 --json tagName | ConvertFrom-Json
            foreach ($r in $json) {
              if ($r.tagName -eq $BaseTag -or $r.tagName -match "^$([regex]::Escape($BaseTag))-r\d+$") {
                return $true
              }
            }
            return $false
          }

          $build = $true
          $reason = "build required"
          if ($fromTagPush -or $forceRebuild) {
            $reason = "tag/dispatch/schedule always builds"
          } elseif (Test-AnyVersionRelease $base) {
            $build = $false
            $reason = "main push and $base already has a release — skip compile (use workflow_dispatch to rebuild)"
          } else {
            $reason = "main push and no release for $base yet"
          }

          "build=$($build.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "gate: build=$build ($reason)"

      - name: Export GitHub Actions cache credentials for vcpkg
        if: steps.gate.outputs.build == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg source downloads
        if: steps.gate.outputs.build == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ steps.ver.outputs.vcpkg_ref }}-${{ steps.ver.outputs.libheif }}-${{ steps.ver.outputs.features_key }}
          restore-keys: |
            vcpkg-downloads-${{ steps.ver.outputs.vcpkg_ref }}-
            vcpkg-downloads-

      - name: Bootstrap vcpkg
        if: steps.gate.outputs.build == 'true'
        shell: pwsh
        run: |
          $ref = "${{ steps.ver.outputs.vcpkg_ref }}"
          $kind = "${{ steps.ver.outputs.vcpkg_ref_kind }}"
          $git = "https://github.com/microsoft/vcpkg"
          # Fresh shallow checkout each run; binary cache (x-gha) holds build
          # products, downloads live under VCPKG_DOWNLOADS (cached separately).
          if (Test-Path C:\vcpkg) {
            Remove-Item -Recurse -Force C:\vcpkg
          }
          if ($kind -eq "commit") {
            git clone --filter=blob:none $git C:\vcpkg
            Push-Location C:\vcpkg
            git checkout $ref
            Pop-Location
          } else {
            git clone --depth 1 --branch $ref $git C:\vcpkg
          }
          New-Item -ItemType Directory -Path $env:VCPKG_DOWNLOADS -Force | Out-Null
          & C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install libheif
        if: steps.gate.outputs.build == 'true'
        shell: pwsh
        run: |
          $features = "${{ steps.ver.outputs.features }}"
          $pkg = "libheif[${features}]:$env:TRIPLET"
          Write-Host "vcpkg install $pkg (VCPKG_BUILD_TYPE=$env:VCPKG_BUILD_TYPE, binary sources=$env:VCPKG_BINARY_SOURCES)"
          & C:\vcpkg\vcpkg.exe install $pkg --clean-after-build
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed: $LASTEXITCODE" }
          if (-not (Test-Path "C:\vcpkg\installed\$env:TRIPLET\lib\heif.lib")) {
            throw "heif.lib missing after install"
          }

      - name: Package release zip
        id: pkg
        if: steps.gate.outputs.build == 'true'
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          TRIPLET: ${{ env.TRIPLET }}
          OUT_ZIP: ${{ github.workspace }}/dist/${{ steps.ver.outputs.asset }}
          LIBHEIF_VERSION: ${{ steps.ver.outputs.libheif }}
          INCLUDE_DEBUG: ${{ steps.ver.outputs.include_debug }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          .\scripts\package-vcpkg-libheif.ps1

      - name: Upload workflow artifact
        if: steps.gate.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.asset }}
          path: |
            dist/${{ steps.ver.outputs.asset }}
            dist/${{ steps.ver.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        # Tags always publish. Dispatch/schedule always publish a (re)build tag.
        # Push to main publishes only when no release exists yet for this version.
        if: >
          steps.gate.outputs.build == 'true' &&
          (startsWith(github.ref, 'refs/tags/libheif-v') ||
           ((github.event_name == 'workflow_dispatch' ||
             github.event_name == 'schedule' ||
             github.event_name == 'push') &&
            steps.pkg.outputs.resolved_version == steps.ver.outputs.libheif))
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "${{ steps.pkg.outputs.resolved_version }}"
          $asset = "${{ steps.ver.outputs.asset }}"
          $path = "dist/$asset"
          $sum = "$path.sha256"
          $sha = "${{ steps.pkg.outputs.sha256 }}"
          $base = "libheif-v$ver"
          $fromTagPush = $env:GITHUB_REF -like "refs/tags/libheif-v*"
          $forceRebuild = $env:EVENT_NAME -in @("workflow_dispatch", "schedule")

          if ($fromTagPush) {
            $tag = $env:GITHUB_REF_NAME
            if ($tag -notmatch "^libheif-v$([regex]::Escape($ver))(-r\d+)?$") {
              throw "git tag $tag does not match packaged libheif-v$ver"
            }
          } else {
            $tag = $base
          }

          $triplet = $env:TRIPLET
          $features = "${{ steps.ver.outputs.features }}"
          $refKind = "${{ steps.ver.outputs.vcpkg_ref_kind }}"
          $ref = "${{ steps.ver.outputs.vcpkg_ref }}"
          $includeDebug = "${{ steps.ver.outputs.include_debug }}"
          # Avoid PowerShell @"..."@ here-strings: a column-0 closing "@" ends the
          # YAML block scalar, and lines like "- Features:" then parse as YAML.
          $notes = @(
            "Prebuilt MSVC libheif $ver for Easel ($triplet).",
            "",
            "* Features: $features",
            "* vcpkg ${refKind}: ``$ref``",
            "* SHA256: ``$sha``",
            "* Debug libs: $includeDebug",
            "",
            "Extract and set ``VCPKG_ROOT`` to the extract root before building Easel.",
            "The zip root must contain ``.vcpkg-root`` and ``installed/``."
          ) -join "`n"

          function Test-ReleaseExists([string]$ReleaseTag) {
            gh release view $ReleaseTag 2>$null | Out-Null
            return ($LASTEXITCODE -eq 0)
          }

          function Get-NextRebuildTag([string]$BaseTag) {
            $max = 1
            $json = gh release list --limit 100 --json tagName | ConvertFrom-Json
            foreach ($r in $json) {
              if ($r.tagName -match "^$([regex]::Escape($BaseTag))-r(\d+)$") {
                $n = [int]$Matches[1]
                if ($n -gt $max) { $max = $n }
              }
            }
            return "$BaseTag-r$($max + 1)"
          }

          function New-Release([string]$ReleaseTag) {
            Write-Host "Creating release $ReleaseTag"
            # Discard gh stdout so callers never capture a URL mixed with exit codes.
            gh release create $ReleaseTag $path $sum --title $ReleaseTag --notes $notes | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "gh release create $ReleaseTag failed with exit $LASTEXITCODE"
            }
          }

          function Test-AnyVersionRelease([string]$BaseTag) {
            if (Test-ReleaseExists $BaseTag) { return $true }
            $json = gh release list --limit 100 --json tagName | ConvertFrom-Json
            foreach ($r in $json) {
              if ($r.tagName -eq $BaseTag -or $r.tagName -match "^$([regex]::Escape($BaseTag))-r\d+$") {
                return $true
              }
            }
            return $false
          }

          if ($fromTagPush) {
            if (Test-ReleaseExists $tag) {
              throw "release $tag already exists; immutable releases cannot be overwritten — push a new libheif-v$ver-rN tag"
            }
            New-Release $tag
          } elseif ($forceRebuild) {
            if (Test-AnyVersionRelease $base) {
              $tag = Get-NextRebuildTag $base
            } else {
              $tag = $base
            }
            try {
              New-Release $tag
            } catch {
              if ($tag -eq $base) {
                Write-Warning "$_ — retrying as next rebuild tag"
                $tag = Get-NextRebuildTag $base
                New-Release $tag
              } else {
                throw
              }
            }
          } else {
            if (Test-AnyVersionRelease $base) {
              Write-Host "Skipping publish: a release for $base already exists. Use workflow_dispatch or a libheif-v* tag to mint a rebuild."
              return
            }
            try {
              New-Release $tag
            } catch {
              Write-Warning "$_ — retrying as next rebuild tag"
              $tag = Get-NextRebuildTag $base
              New-Release $tag
            }
          }
          Write-Host "Published $tag / $asset (sha256=$sha)"
